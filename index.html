<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一句话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: rgba(0, 0, 0);
        }

        body {
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background-image 0.5s ease;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.57);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 85%;
        }

        .hitokoto {
            font-size: 1.8rem;
            line-height: 1.6;
            color: rgba(255, 255, 255);
            text-shadow:
                0 0 8px rgba(0, 0, 0),
                1px 1px 4px rgba(0, 0, 0),
                2px 2px 6px rgba(0, 0, 0);
            font-family: 'Georgia', 'Times New Roman', '宋体', serif;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .from {
            font-size: 0.95rem;
            color: rgba(255, 255, 255);
            text-shadow:
                0 0 8px rgba(0, 0, 0),
                1px 1px 4px rgba(0, 0, 0),
                2px 2px 6px rgba(0, 0, 0);
            font-family: 'Arial', sans-serif;
        }

        .dot {
            position: fixed;
            bottom: 7px;
            right: 17px;
            color: rgba(255, 255, 255);
            background: rgba(0, 0, 0, 0);
            z-index: 2;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hitokoto" id="hitokoto">正在加载 请稍等片刻</div>
        <div class="from" id="from"></div>
    </div>
    <div class="dot">•</div>

    <script>
        function removeScriptTags(str) {
            return str.replaceAll('script', '');
        }

        function fetchHitokoto() {

            const bgUrl = 'https://api.elaina.cat/random/pc';
            document.body.style.backgroundImage = "url('" + bgUrl + "')";


            fetch('https://v1.hitokoto.cn')
                .then(response => response.json())
                .then(data => {
                    let text = data.hitokoto || '';
                    let from = data.from || '';

                    text = removeScriptTags(text);
                    from = removeScriptTags(from);

                    const hitokotoEl = document.getElementById('hitokoto');
                    hitokotoEl.innerText = text ? `「 ${text} 」` : '';

                    if (from) {
                        const fromEl = document.getElementById('from');
                        fromEl.innerText = `—— ${from}`;
                    }
                })
                .catch(err => {
                    console.log(err);
                });
        }

        fetchHitokoto();
    </script>
</body>

</html>
