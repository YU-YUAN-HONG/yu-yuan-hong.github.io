<!DOCTYPE html>
<html style="background-color: black;color: #FFF;">

<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="shortcut icon" href="favicon.ico" />
    <title>Nginx</title>
    <meta charset="utf-8">
</head>
<style>
    html,
    html>*,
    body,
    iframe {
        color: #D7D7D7;
        font-size: 17px;
        user-select: none !important;
        text-rendering: optimizelegibility;
        padding: 0;
        margin: 0;
        text-decoration: none;
        word-wrap: break-word;
        word-break: break-word;
        scrollbar-width: none;
        scrollbar-color: #ffffff;
        width: 100%;
        height: 100%;
        min-width: 100%;
        min-height: 100%;
        max-width: 100%;
        max-height: 100%;
        scrollbar-color: #ffffff #0000;
        border: none;
        overflow: hidden;
    }

    ::-webkit-scrollbar-track {
        -webkit-box-shadow: inset 0 0 7px #0000;
        background-color: #0000;
    }

    ::-webkit-scrollbar {
        width: 7px;
        display: none;
        background-color: #0000;
    }

    ::-webkit-scrollbar-thumb {
        background-color: #202020;
    }
</style>

<body>
    <iframe src="yuyuanhong.cn" frameborder="0"></iframe>
</body>

</html>
